# Contribution difficulty
- name: "difficulty/easy"
  color: "0e8a16"
  description: "1-3 hours, minimal context needed"
- name: "difficulty/medium"
  color: "fbca04"
  description: "Half day, some familiarity with the crate"
- name: "difficulty/hard"
  color: "d93f0b"
  description: "1 day+, requires understanding multiple crates"

# Area labels — each area has a distinct color
- name: "area/kernel"
  color: "B60205"
  description: "Core kernel (scheduling, RBAC, workflows)"
- name: "area/runtime"
  color: "D93F0B"
  description: "Agent loop, LLM drivers, WASM sandbox"
- name: "area/api"
  color: "E36209"
  description: "REST/WS endpoints and dashboard"
- name: "area/channels"
  color: "0E8A16"
  description: "Messaging channel adapters"
- name: "area/skills"
  color: "1D76DB"
  description: "Skill system and FangHub marketplace"
- name: "area/memory"
  color: "5319E7"
  description: "SQLite memory substrate"
- name: "area/security"
  color: "E99695"
  description: "Security systems and auditing"
- name: "area/cli"
  color: "006B75"
  description: "CLI and TUI interface"
- name: "area/desktop"
  color: "1C334D"
  description: "Tauri desktop application"
- name: "area/docs"
  color: "0075CA"
  description: "Documentation and guides"
- name: "area/sdk"
  color: "FBCA04"
  description: "JavaScript and Python SDKs"
- name: "area/ci"
  color: "5319E7"
  description: "CI/CD and build tooling"

# Contribution type
- name: "type/agent-template"
  color: "BFD4F2"
  description: "New or updated agent template (TOML only)"
- name: "type/skill"
  color: "D4C5F9"
  description: "New or updated skill (Python/JS/Prompt)"
- name: "type/channel"
  color: "C2E0C6"
  description: "New or updated channel adapter"
- name: "type/provider"
  color: "FEF2C0"
  description: "New or updated LLM provider driver"

# Status
- name: "needs-triage"
  color: "ededed"
  description: "Auto-applied when the issue title/body matched no area label — needs maintainer review"
- name: "needs-rfc"
  color: "d876e3"
  description: "Requires an RFC before implementation"
- name: "ready-for-review"
  color: "0e8a16"
  description: "PR is ready for maintainer review"
- name: "needs-changes"
  color: "e99695"
  description: "Changes requested by reviewer"
- name: "awaiting-response"
  color: "c5def5"
  description: "Maintainer replied — waiting for reporter/contributor feedback"
- name: "needs-attention"
  color: "fbca04"
  description: "Reporter/contributor replied — needs maintainer action"
- name: "has-conflicts"
  color: "d93f0b"
  description: "PR has merge conflicts that need resolution"
- name: "ci-failed"
  color: "b60205"
  description: "CI checks failed — needs fix before merge"
- name: "needs-info"
  color: "c5def5"
  description: "Issue lacks reproduction steps, logs, or version info"
- name: "has-pr"
  color: "0e8a16"
  description: "A pull request has been linked to this issue"
- name: "stale-pr"
  color: "ededed"
  description: "PR has had no activity for 14+ days"
# PR size
- name: "size/XS"
  color: "0e8a16"
  description: "< 10 lines changed"
- name: "size/S"
  color: "77c940"
  description: "10-49 lines changed"
- name: "size/M"
  color: "fbca04"
  description: "50-249 lines changed"
- name: "size/L"
  color: "e36209"
  description: "250-999 lines changed"
- name: "size/XL"
  color: "d93f0b"
  description: "1000+ lines changed"

- name: "no-rust-required"
  color: "bfdadc"
  description: "This task does not require Rust knowledge"
