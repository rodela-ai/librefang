name: Good First Issue
description: A well-scoped task suitable for new contributors
labels: ["good first issue", "help wanted"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for creating a good-first-issue! Please fill in the details below so new contributors can pick this up with confidence.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of LibreFang does this touch?
      options:
        - "Skills (Python/JS — no Rust needed)"
        - "Agent Templates (TOML only)"
        - "Documentation / Translation"
        - "Channel Adapters (Rust)"
        - "LLM Provider Adapters (Rust)"
        - "Core Crates (Rust)"
        - "CI / Tooling"
        - "Desktop App (Tauri)"
        - "SDK (JavaScript/Python)"
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Estimated Difficulty
      options:
        - "🟢 Easy (1-3 hours, minimal context needed)"
        - "🟡 Medium (half day, some familiarity with the crate)"
        - "🟠 Hard (1 day+, requires understanding multiple crates)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What needs to be done
      description: A clear, specific description of the task.
      placeholder: |
        Example: Add a `summarize` skill that takes a URL, fetches the page content,
        and returns a 3-sentence summary using the agent's configured LLM.
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Files to modify
      description: List the files or directories the contributor will need to touch.
      placeholder: |
        - `crates/librefang-skills/src/builtin/summarize.rs` (new file)
        - `crates/librefang-skills/src/lib.rs` (register the skill)
    validations:
      required: true

  - type: textarea
    id: how-to-test
    attributes:
      label: How to verify
      description: Commands or steps to confirm the change works.
      placeholder: |
        ```bash
        cargo test -p librefang-skills -- summarize
        cargo clippy --workspace --all-targets -- -D warnings
        ```
    validations:
      required: true

  - type: textarea
    id: hints
    attributes:
      label: Hints & references
      description: Links to similar implementations, relevant docs, or tips.
      placeholder: |
        - Look at `crates/librefang-skills/src/builtin/web_fetch.rs` for a similar pattern
        - Skill development guide: docs/src/app/agent/skills/page.mdx

  - type: checkboxes
    id: rust-required
    attributes:
      label: Rust knowledge required?
      options:
        - label: "This task requires writing Rust code"
