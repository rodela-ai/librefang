name: Nix Build

# Catches NixOS build breakage on flake.nix or workspace changes after
# they reach main. Past incidents (#2937, #2974, #3052, #3156, #3197) all
# slipped through because regular CI doesn't exercise the Nix path.
#
# Runs on push-to-main only — running on every PR push burned runner
# minutes on builds gated by flake.lock / Cargo.lock churn that isn't
# authoritative until merge. Trigger manually with workflow_dispatch
# when a PR explicitly needs a pre-merge nix check.
on:
  push:
    branches: [main]
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**/Cargo.toml'
      - '.github/workflows/nix-build.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  nix-build:
    name: nix build (${{ matrix.package }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        package:
          - librefang-cli
          - librefang-desktop
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Nix
        uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache /nix/store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ matrix.package }}-${{ hashFiles('flake.lock', 'Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ matrix.package }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ matrix.package }}-
          purge-created: 0
          purge-last-accessed: 0
          purge-primary-key: never

      - name: Build .#${{ matrix.package }}
        run: nix build --print-build-logs .#${{ matrix.package }}
