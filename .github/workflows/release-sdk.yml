name: "Release / SDK"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-sdk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Wait for the GitHub Release to be created ────────────────────────────
  wait_for_release:
    name: Wait for Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Wait for release or create fallback
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for i in $(seq 1 12); do
            if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
              echo "✓ Release $TAG found"
              exit 0
            fi
            echo "Waiting for release $TAG to be created... ($i/12)"
            sleep 5
          done

          # Fallback: create a minimal release so builds can proceed
          echo "::warning::Release not found after 60s, creating fallback release"
          VERSION="${TAG#v}"
          # Strip pre-release suffix then strip hour for CHANGELOG
          VERSION=$(echo "$VERSION" | sed 's/-.*//')
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          if [ ${#PATCH} -eq 4 ]; then
            VERSION="$(echo "$VERSION" | cut -d. -f1,2).${PATCH:0:2}"
          fi
          CHANGES=$(awk '/^## \['"$VERSION"'\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md)
          if [ -z "$CHANGES" ]; then
            CHANGES="See [CHANGELOG](https://github.com/librefang/librefang/blob/main/CHANGELOG.md) for details."
          fi
          # Detect pre-release tags (-betaN, -rcN)
          PRERELEASE_FLAG=""
          if echo "$TAG" | grep -qE '-(beta|rc)[0-9]'; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --title "LibreFang $TAG" \
            --notes "$CHANGES" \
            $PRERELEASE_FLAG \
            --repo "${{ github.repository }}" || true

  # ── JavaScript SDK → npm ─────────────────────────────────────────────────
  sdk_javascript:
    name: SDK / JavaScript (npm)
    needs: [wait_for_release]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/javascript
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "Publishing @librefang/sdk@$VERSION"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null; then
            echo "✓ ${PKG_NAME}@${PKG_VERSION} already published to npm, skipping"
          else
            NPM_TAG=""
            if echo "$PKG_VERSION" | grep -qE '-(beta|rc)[0-9]'; then
              NPM_TAG="--tag next"
            fi
            npm publish --access public $NPM_TAG
          fi

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm config set registry https://npm.pkg.github.com
          npm publish --access public 2>/dev/null || echo "✓ Already published to GitHub Packages, skipping"

  # ── Python SDK → PyPI ─────────────────────────────────────────────────────
  sdk_python:
    name: SDK / Python (PyPI)
    needs: [wait_for_release]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # PEP 440: convert -beta1 → b1, -rc1 → rc1
          PYPI_VERSION=$(echo "$VERSION" | sed 's/-beta/b/; s/-rc/rc/')
          sed -i "s/^version = .*/version = \"$PYPI_VERSION\"/" pyproject.toml
          echo "Publishing librefang-sdk==$PYPI_VERSION"
          grep '^version' pyproject.toml

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  # ── Rust SDK → crates.io ──────────────────────────────────────────────────
  sdk_rust:
    name: SDK / Rust (crates.io)
    needs: [wait_for_release]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/rust
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" Cargo.toml
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          sed -i '/^\[dependencies\]/,/^```/ s/librefang = "[^"]*"/librefang = "'"$MAJOR_MINOR"'"/' README.md
          echo "Publishing librefang@$VERSION"
          grep '^version' Cargo.toml

      - name: Test
        run: cargo test

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if cargo search librefang --limit 1 2>/dev/null | grep -q "librefang = \"$VERSION\""; then
            echo "✓ librefang@$VERSION already published to crates.io, skipping"
          else
            cargo publish --allow-dirty
          fi

  # ── Go SDK — tag for Go modules ──────────────────────────────────────────
  sdk_go:
    name: SDK / Go (tag)
    needs: [wait_for_release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create Go module tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          REPO="${{ github.repository }}"

          # Map CalVer to Go-compatible v0.YYYYMMDD.HH (keeps major=0, no /v2026 import path)
          # e.g. 2026.3.2114 → v0.20260321.14, 2026.3.2114-rc1 → v0.20260321.14-rc1
          YEAR=$(echo "$VERSION" | cut -d. -f1)
          MONTH=$(printf '%02d' "$(echo "$VERSION" | cut -d. -f2)")
          DDHH=$(echo "$VERSION" | cut -d. -f3 | sed 's/-.*//')
          PRERELEASE=$(echo "$VERSION" | grep -oE '\-.*' || true)
          DD=${DDHH:0:2}
          HH=$((10#${DDHH:2:2}))  # strip leading zero (SemVer forbids 01, 02, etc.)
          GO_VERSION="0.${YEAR}${MONTH}${DD}.${HH}${PRERELEASE}"
          GO_TAG="sdk/go/v${GO_VERSION}"

          # Check if tag already exists
          if gh api "repos/$REPO/git/refs/tags/$GO_TAG" &>/dev/null; then
            echo "Tag $GO_TAG already exists, skipping"
            exit 0
          fi

          # Get the commit SHA for this tag
          SHA=$(gh api "repos/$REPO/git/ref/tags/${GITHUB_REF#refs/tags/}" --jq '.object.sha')

          # Create tag via API (avoids git push workflow permission issue)
          gh api "repos/$REPO/git/refs" \
            -f ref="refs/tags/$GO_TAG" \
            -f sha="$SHA"
          echo "✓ Published Go module tag: $GO_TAG (from $VERSION)"
