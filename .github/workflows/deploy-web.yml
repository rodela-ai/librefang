name: Deploy Website

on:
  push:
    branches: [main, feat/*, feature/*]
    paths:
      - "web/**"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      # `cache: pnpm` feature runs `pnpm --version` to compute the cache
      # key, and that fails if pnpm isn't on PATH yet. Modern setup-node
      # (v6 + Node ≥22, which bundles corepack) preserves corepack shims
      # across the Node swap, so running `enable` once up front is
      # sufficient — no need for the second call after setup-node.
      - name: Enable corepack (activates pnpm from packageManager field)
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: "web/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - run: cd web && pnpm --version && pnpm install --frozen-lockfile

      - run: cd web && pnpm lint

      - run: cd web && pnpm build

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 pages deploy web/dist --project-name=librefang --branch="${{ github.head_ref || github.ref_name }}"
