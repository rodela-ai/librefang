name: Issue-PR Link Labels

# When a PR is opened/edited that references an issue (via "Closes #N",
# "Fixes #N", etc.), add "has-pr" to the issue. When the PR is merged,
# close the issue (GitHub does this natively, but we also clean up the label).
# When the PR is closed without merge, remove "has-pr" from the issue.

on:
  pull_request_target:
    types: [opened, edited, closed, reopened]

permissions:
  issues: write
  pull-requests: read

jobs:
  link:
    runs-on: ubuntu-latest
    steps:
      - name: Sync has-pr label on linked issues
        uses: actions/github-script@v9
        with:
          script: |
            const LABEL = 'has-pr';
            const pr = context.payload.pull_request;

            // Extract issue numbers from PR body ("Closes #N", "Fixes #N", etc.)
            const body = pr.body || '';
            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const issueNumbers = new Set();
            let match;
            while ((match = pattern.exec(body)) !== null) {
              issueNumbers.add(parseInt(match[1], 10));
            }

            if (issueNumbers.size === 0) {
              core.info('No linked issues found in PR body');
              return;
            }

            for (const num of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                });
                const labels = issue.labels.map(l => l.name);
                const hasLabel = labels.includes(LABEL);

                if (pr.state === 'open' && !hasLabel) {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: num,
                    labels: [LABEL],
                  });
                  core.info(`Issue #${num}: added "${LABEL}"`);
                } else if (pr.state === 'closed' && !pr.merged && hasLabel) {
                  // PR closed without merge — check if any other open PR links this issue
                  const { data: prs } = await github.rest.pulls.list({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    state: 'open',
                    per_page: 100,
                  });
                  const otherLinked = prs.some(p => {
                    const b = p.body || '';
                    const re = new RegExp(`(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\\s+#${num}\\b`, 'i');
                    return re.test(b);
                  });
                  if (!otherLinked) {
                    await github.rest.issues.removeLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: num,
                      name: LABEL,
                    }).catch(() => {});
                    core.info(`Issue #${num}: removed "${LABEL}" (PR closed without merge)`);
                  }
                }
              } catch (e) {
                core.warning(`Issue #${num}: ${e.message}`);
              }
            }
