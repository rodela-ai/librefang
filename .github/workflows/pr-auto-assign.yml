name: PR Auto Assign

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: .github/CODEOWNERS
          sparse-checkout-cone-mode: false

      - name: Auto-assign PR author and request review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          REPO="${{ github.repository }}"

          # Assign PR to author (skip if author is not a repo collaborator)
          gh pr edit "$PR" --repo "$REPO" --add-assignee "$AUTHOR" 2>/dev/null || true

          # Parse individual reviewers from CODEOWNERS (e.g. @houko, skip teams like @librefang/core)
          REVIEWERS=$(grep -oP '(?<=@)[\w-]+' .github/CODEOWNERS | grep -v '^librefang/' | sort -u)
          for reviewer in $REVIEWERS; do
            if [ "$reviewer" != "$AUTHOR" ]; then
              gh pr edit "$PR" --repo "$REPO" --add-reviewer "$reviewer" 2>/dev/null || true
            fi
          done
