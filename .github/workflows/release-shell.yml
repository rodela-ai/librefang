name: "Release / Shell"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-shell-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Wait for the GitHub Release to be created ────────────────────────────
  wait_for_release:
    name: Wait for Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Wait for release or create fallback
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for i in $(seq 1 12); do
            if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
              echo "✓ Release $TAG found"
              exit 0
            fi
            echo "Waiting for release $TAG to be created... ($i/12)"
            sleep 5
          done

          # Fallback: create a minimal release so builds can proceed
          echo "::warning::Release not found after 60s, creating fallback release"
          VERSION="${TAG#v}"
          # Strip pre-release suffix then strip hour for CHANGELOG
          VERSION=$(echo "$VERSION" | sed 's/-.*//')
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          if [ ${#PATCH} -eq 4 ]; then
            VERSION="$(echo "$VERSION" | cut -d. -f1,2).${PATCH:0:2}"
          fi
          CHANGES=$(awk '/^## \['"$VERSION"'\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md)
          if [ -z "$CHANGES" ]; then
            CHANGES="See [CHANGELOG](https://github.com/librefang/librefang/blob/main/CHANGELOG.md) for details."
          fi
          # Detect pre-release tags (-betaN, -rcN)
          PRERELEASE_FLAG=""
          if echo "$TAG" | grep -qE '-(beta|rc)[0-9]'; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --title "LibreFang $TAG" \
            --notes "$CHANGES" \
            $PRERELEASE_FLAG \
            --repo "${{ github.repository }}" || true

  # ── CLI Binary (macOS) ────────────────────────────────────────────────────
  cli_mac:
    name: CLI / ${{ matrix.target }}
    needs: [wait_for_release]
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
          - target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} --bin librefang
      - name: Ad-hoc codesign
        run: |
          xattr -cr target/${{ matrix.target }}/release/librefang || true
          codesign --force --sign - target/${{ matrix.target }}/release/librefang
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../librefang-${{ matrix.target }}.tar.gz librefang
          cd ../../..
          shasum -a 256 librefang-${{ matrix.target }}.tar.gz > librefang-${{ matrix.target }}.tar.gz.sha256
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" librefang-${{ matrix.target }}.* --clobber

  # ── CLI Binary (Linux) ──────────────────────────────────────────────────
  cli_linux:
    name: CLI / ${{ matrix.target }}
    needs: [wait_for_release]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            use_cross: true

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build CLI
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin librefang
          else
            cargo build --release --target ${{ matrix.target }} --bin librefang
          fi
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../librefang-${{ matrix.target }}.tar.gz librefang
          cd ../../..
          sha256sum librefang-${{ matrix.target }}.tar.gz > librefang-${{ matrix.target }}.tar.gz.sha256
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" librefang-${{ matrix.target }}.* --clobber

  # ── CLI Binary (Android / Termux) ───────────────────────────────────────
  cli_android:
    name: CLI / aarch64-linux-android
    needs: [wait_for_release]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cross
        run: cargo install cross --locked
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-aarch64-linux-android-${{ github.ref_name }}
      - name: Build CLI (Android aarch64)
        run: cross build --release --target aarch64-linux-android --bin librefang
      - name: Package
        run: |
          cd target/aarch64-linux-android/release
          tar czf ../../../librefang-aarch64-linux-android.tar.gz librefang
          cd ../../..
          sha256sum librefang-aarch64-linux-android.tar.gz > librefang-aarch64-linux-android.tar.gz.sha256
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" librefang-aarch64-linux-android.* --clobber

  # ── CLI Binary (Linux) - Mini (12 channels) ───────────────────────────────
  cli_linux_mini:
    name: CLI / ${{ matrix.target }} (mini)
    needs: [wait_for_release]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-mini-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build CLI (mini)
        run: cargo build --release --target ${{ matrix.target }} --bin librefang --no-default-features --features mini
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../librefang-${{ matrix.target }}-mini.tar.gz librefang
          cd ../../..
          sha256sum librefang-${{ matrix.target }}-mini.tar.gz > librefang-${{ matrix.target }}-mini.tar.gz.sha256
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" librefang-${{ matrix.target }}-mini.* --clobber

  # ── CLI Binary (Linux, musl — fully static) ─────────────────────────────
  cli_musl:
    name: CLI / ${{ matrix.target }} (static)
    needs: [wait_for_release]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        run: cargo install cross --locked
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build static CLI
        run: cross build --release --target ${{ matrix.target }} --bin librefang
      - name: Verify static linking
        run: |
          FILE_OUT=$(file target/${{ matrix.target }}/release/librefang)
          echo "$FILE_OUT"
          if ! echo "$FILE_OUT" | grep -qE "statically linked|static-pie linked"; then
            echo "::error::Binary is not statically linked!"
            exit 1
          fi
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../librefang-${{ matrix.target }}.tar.gz librefang
          cd ../../..
          sha256sum librefang-${{ matrix.target }}.tar.gz > librefang-${{ matrix.target }}.tar.gz.sha256
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" librefang-${{ matrix.target }}.* --clobber

  # ── CLI Binary (Windows) ────────────────────────────────────────────────
  cli_windows:
    name: CLI / ${{ matrix.target }}
    needs: [wait_for_release]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
          - target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} --bin librefang
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/librefang.exe" -DestinationPath "librefang-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "librefang-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  librefang-${{ matrix.target }}.zip" | Out-File -Encoding ASCII "librefang-${{ matrix.target }}.zip.sha256"
      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" librefang-${{ matrix.target }}.* --clobber

  # ── CLI Binary (macOS) - Mini ─────────────────────────────────────────────
  cli_mac_mini:
    name: CLI / ${{ matrix.target }} (mini)
    needs: [wait_for_release]
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-mini-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build CLI (mini)
        run: cargo build --release --target ${{ matrix.target }} --bin librefang --no-default-features --features mini
      - name: Ad-hoc codesign
        run: |
          xattr -cr target/${{ matrix.target }}/release/librefang || true
          codesign --force --sign - target/${{ matrix.target }}/release/librefang
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../librefang-${{ matrix.target }}-mini.tar.gz librefang
          cd ../../..
          shasum -a 256 librefang-${{ matrix.target }}-mini.tar.gz > librefang-${{ matrix.target }}-mini.tar.gz.sha256
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" librefang-${{ matrix.target }}-mini.* --clobber

  # ── CLI Binary (Windows) - Mini ───────────────────────────────────────────
  cli_windows_mini:
    name: CLI / ${{ matrix.target }} (mini)
    needs: [wait_for_release]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-mini-${{ matrix.target }}-${{ github.ref_name }}
      - name: Build CLI (mini)
        run: cargo build --release --target ${{ matrix.target }} --bin librefang --no-default-features --features mini
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/librefang.exe" -DestinationPath "librefang-${{ matrix.target }}-mini.zip"
          $hash = (Get-FileHash "librefang-${{ matrix.target }}-mini.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  librefang-${{ matrix.target }}-mini.zip" | Out-File -Encoding ASCII "librefang-${{ matrix.target }}-mini.zip.sha256"
      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" librefang-${{ matrix.target }}-mini.* --clobber

  # ── CLI Binary → npm ────────────────────────────────────────────────────
  cli_npm:
    name: CLI / npm
    needs: [cli_mac, cli_linux, cli_musl, cli_windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish CLI binaries to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cargo xtask publish-npm-binaries \
            --version "$VERSION" \
            --repo "${{ github.repository }}" \
            --tag "${{ github.ref_name }}"

  # ── CLI Binary → PyPI ──────────────────────────────────────────────────
  cli_pypi:
    name: CLI / PyPI
    needs: [cli_mac, cli_linux, cli_musl, cli_windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Publish CLI binaries to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cargo xtask publish-pypi-binaries \
            --version "$VERSION" \
            --repo "${{ github.repository }}" \
            --tag "${{ github.ref_name }}"

  # ── Sync to Homebrew Tap ──────────────────────────────────────────────
  sync_homebrew:
    name: Sync to Homebrew Tap
    runs-on: ubuntu-latest
    needs: [cli_mac]
    steps:
      - name: Check out tap repo
        uses: actions/checkout@v6
        with:
          repository: librefang/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Fetch release metadata (with retry for asset availability)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # Retry up to 10 times (100s total) to allow asset uploads to complete
          for attempt in $(seq 1 10); do
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
              > release.json

            jq -e '.tag_name and (.assets | type == "array")' release.json >/dev/null

            # Check that all 4 CLI assets exist (macOS + Linux, arm64 + x86_64)
            MAC_ARM_OK=$(jq -r '.assets[] | select(.name == "librefang-aarch64-apple-darwin.tar.gz") | .name' release.json)
            MAC_X86_OK=$(jq -r '.assets[] | select(.name == "librefang-x86_64-apple-darwin.tar.gz") | .name' release.json)
            LNX_ARM_OK=$(jq -r '.assets[] | select(.name == "librefang-aarch64-unknown-linux-gnu.tar.gz") | .name' release.json)
            LNX_X86_OK=$(jq -r '.assets[] | select(.name == "librefang-x86_64-unknown-linux-gnu.tar.gz") | .name' release.json)

            if [ -n "$MAC_ARM_OK" ] && [ -n "$MAC_X86_OK" ] && [ -n "$LNX_ARM_OK" ] && [ -n "$LNX_X86_OK" ]; then
              echo "✓ All 4 CLI assets found on attempt $attempt"
              break
            fi

            if [ "$attempt" -eq 10 ]; then
              echo "::error::CLI assets not found in release after 10 attempts"
              echo "  macOS ARM: ${MAC_ARM_OK:-MISSING}"
              echo "  macOS x86: ${MAC_X86_OK:-MISSING}"
              echo "  Linux ARM: ${LNX_ARM_OK:-MISSING}"
              echo "  Linux x86: ${LNX_X86_OK:-MISSING}"
              exit 1
            fi

            echo "Waiting for CLI assets to be uploaded... ($attempt/10)"
            sleep 10
          done

      - name: Generate formula
        run: |
          set -euo pipefail

          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          SEMVER="${VERSION}"

          # Skip Homebrew tap update for pre-release versions
          if echo "$VERSION" | grep -qE '-(beta|rc)[0-9]'; then
            echo "Pre-release version ($VERSION), skipping Homebrew formula update"
            exit 0
          fi

          asset_url() {
            jq -r --arg name "$1" '.assets[] | select(.name == $name) | .browser_download_url' release.json
          }

          asset_sha() {
            local sha_url
            sha_url="$(jq -r --arg name "${1}.sha256" '.assets[] | select(.name == $name) | .browser_download_url' release.json)"
            if [ -z "$sha_url" ] || [ "$sha_url" = "null" ]; then
              # Download asset and compute SHA256 locally
              local asset_url
              asset_url="$(jq -r --arg name "$1" '.assets[] | select(.name == $name) | .browser_download_url' release.json)"
              curl -fsSL "$asset_url" | sha256sum | awk '{print $1}'
            else
              curl -fsSL "$sha_url" | awk '{print $1}'
            fi
          }

          asset_size() {
            jq -r --arg name "$1" '.assets[] | select(.name == $name) | .size' release.json
          }

          # macOS assets
          ARM64_DARWIN_NAME="librefang-aarch64-apple-darwin.tar.gz"
          X86_DARWIN_NAME="librefang-x86_64-apple-darwin.tar.gz"
          # Linux assets
          ARM64_LINUX_NAME="librefang-aarch64-unknown-linux-gnu.tar.gz"
          X86_LINUX_NAME="librefang-x86_64-unknown-linux-gnu.tar.gz"

          ARM64_DARWIN_URL="$(asset_url "$ARM64_DARWIN_NAME")"
          X86_DARWIN_URL="$(asset_url "$X86_DARWIN_NAME")"
          ARM64_LINUX_URL="$(asset_url "$ARM64_LINUX_NAME")"
          X86_LINUX_URL="$(asset_url "$X86_LINUX_NAME")"

          ARM64_DARWIN_SHA="$(asset_sha "$ARM64_DARWIN_NAME")"
          X86_DARWIN_SHA="$(asset_sha "$X86_DARWIN_NAME")"
          ARM64_LINUX_SHA="$(asset_sha "$ARM64_LINUX_NAME")"
          X86_LINUX_SHA="$(asset_sha "$X86_LINUX_NAME")"

          ARM64_DARWIN_SIZE="$(asset_size "$ARM64_DARWIN_NAME")"
          X86_DARWIN_SIZE="$(asset_size "$X86_DARWIN_NAME")"
          ARM64_LINUX_SIZE="$(asset_size "$ARM64_LINUX_NAME")"
          X86_LINUX_SIZE="$(asset_size "$X86_LINUX_NAME")"

          for required in \
            ARM64_DARWIN_URL X86_DARWIN_URL ARM64_LINUX_URL X86_LINUX_URL \
            ARM64_DARWIN_SHA X86_DARWIN_SHA ARM64_LINUX_SHA X86_LINUX_SHA \
            ARM64_DARWIN_SIZE X86_DARWIN_SIZE ARM64_LINUX_SIZE X86_LINUX_SIZE
          do
            if [ -z "${!required}" ] || [ "${!required}" = "null" ]; then
              echo "Missing release metadata: $required" >&2
              exit 1
            fi
          done

          for size_var in ARM64_DARWIN_SIZE X86_DARWIN_SIZE ARM64_LINUX_SIZE X86_LINUX_SIZE
          do
            if [ "${!size_var}" -le 0 ]; then
              echo "Release asset is empty: $size_var" >&2
              exit 1
            fi
          done

          # --- Main formula (latest) ---
          cat > tap/Formula/librefang.rb <<FORMULA
          class Librefang < Formula
            desc "Community-Maintained Agent Operating System written in Rust"
            homepage "https://librefang.ai"
            license "MIT"
            version "$SEMVER"

            livecheck do
              url "https://github.com/librefang/librefang/releases/latest"
              strategy :header_match
            end

            on_macos do
              if Hardware::CPU.arm?
                url "$ARM64_DARWIN_URL"
                sha256 "$ARM64_DARWIN_SHA"
              else
                url "$X86_DARWIN_URL"
                sha256 "$X86_DARWIN_SHA"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "$ARM64_LINUX_URL"
                sha256 "$ARM64_LINUX_SHA"
              else
                url "$X86_LINUX_URL"
                sha256 "$X86_LINUX_SHA"
              end
            end

            def install
              bin.install "librefang"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/librefang --version")
            end
          end
          FORMULA

          # --- Versioned formula (e.g. librefang@2026.3.2114) ---
          # Class name: LibrefangAT202632114 (@ → AT, dots removed)
          CLASS_SUFFIX=$(echo "$SEMVER" | tr -d '.')
          CLASS_NAME="LibrefangAT${CLASS_SUFFIX}"

          cat > "tap/Formula/librefang@${SEMVER}.rb" <<FORMULA
          class ${CLASS_NAME} < Formula
            desc "Community-Maintained Agent Operating System written in Rust"
            homepage "https://librefang.ai"
            license "MIT"
            version "$SEMVER"

            livecheck do
              url "https://github.com/librefang/librefang/releases/latest"
              strategy :header_match
            end

            on_macos do
              if Hardware::CPU.arm?
                url "$ARM64_DARWIN_URL"
                sha256 "$ARM64_DARWIN_SHA"
              else
                url "$X86_DARWIN_URL"
                sha256 "$X86_DARWIN_SHA"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "$ARM64_LINUX_URL"
                sha256 "$ARM64_LINUX_SHA"
              else
                url "$X86_LINUX_URL"
                sha256 "$X86_LINUX_SHA"
              end
            end

            keg_only :versioned_formula

            def install
              bin.install "librefang"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/librefang --version")
            end
          end
          FORMULA

          echo "=== Main formula ==="
          cat tap/Formula/librefang.rb
          echo ""
          echo "=== Versioned formula: librefang@${SEMVER}.rb ==="
          cat "tap/Formula/librefang@${SEMVER}.rb"

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "chore: update formula to ${{ github.ref_name }}" || echo "No changes"
          git push

