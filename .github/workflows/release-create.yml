name: "Release / Create"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-create-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # Strip pre-release suffix (-betaN / -rcN) then strip hour for CHANGELOG
          VERSION=$(echo "$VERSION" | sed 's/-.*//')
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          if [ ${#PATCH} -eq 4 ]; then
            VERSION="$(echo "$VERSION" | cut -d. -f1,2).${PATCH:0:2}"
          fi

          # Extract this version's changelog section
          CHANGES=$(awk '/^## \['"$VERSION"'\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md)

          if [ -z "$CHANGES" ]; then
            CHANGES="See [CHANGELOG](https://github.com/librefang/librefang/blob/main/CHANGELOG.md) for details."
          fi

          # Write to file for multiline output
          echo "$CHANGES" > /tmp/changelog.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          {
            echo "## What's New"
            echo ""
            cat /tmp/changelog.md
            echo ""
            echo "## Installation"
            echo ""
            echo "**Desktop App** — Download the installer for your platform below."
            echo ""
            echo '**CLI (Linux/macOS):**'
            echo '```bash'
            echo 'curl -fsSL https://librefang.ai/install.sh | sh'
            echo '```'
            echo ""
            echo '**npm:**'
            echo '```bash'
            echo 'npm install -g @librefang/cli'
            echo '```'
            echo ""
            echo '**pip:**'
            echo '```bash'
            echo 'pip install librefang'
            echo '```'
            echo ""
            echo '**Cargo:**'
            echo '```bash'
            echo 'cargo install librefang'
            echo '```'
            echo ""
            echo '**Docker:**'
            echo '```bash'
            echo 'docker pull ghcr.io/librefang/librefang:latest'
            echo '```'
            echo ""
            echo "## Migration"
            echo ""
            echo '**Coming from OpenClaw or OpenFang?**'
            echo '```bash'
            echo 'librefang migrate --from openclaw'
            echo 'librefang migrate --from openfang'
            echo '```'
            echo ""
            echo "## Links"
            echo ""
            echo "- [Documentation](https://librefang.ai)"
            echo "- [Discord](https://discord.gg/DzTYqAZZmc)"
            echo "- [Contributing Guide](https://github.com/librefang/librefang/blob/main/docs/CONTRIBUTING.md)"
          } > /tmp/release-body.md

          # Detect pre-release tags (-betaN, -rcN)
          PRERELEASE_FLAG=""
          if echo "$TAG" | grep -qE '-(beta|rc)[0-9]'; then
            PRERELEASE_FLAG="--prerelease"
          fi

          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, updating..."
            gh release edit "$TAG" \
              --title "LibreFang $TAG" \
              --notes-file /tmp/release-body.md \
              $PRERELEASE_FLAG
          else
            gh release create "$TAG" \
              --title "LibreFang $TAG" \
              --notes-file /tmp/release-body.md \
              $PRERELEASE_FLAG
          fi
