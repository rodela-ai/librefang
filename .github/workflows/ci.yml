      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: test-macos-${{ hashFiles('**/Cargo.lock') }}
      - name: Install nextest
        uses: taiki-e/install-action@4616abf838e456930a67014fba647f87c185cc6c # nextest
      - name: Ensure dashboard build dir exists
        run: mkdir -p crates/librefang-api/static/react
      - name: Run tests
        run: |
          if [ "${{ needs.changes.outputs.full_test }}" = "true" ]; then
            echo "Running workspace tests (full run)…"
            cargo nextest run --workspace --no-fail-fast
          else
            CRATES="${{ needs.changes.outputs.crates }}"
            if [ -z "$CRATES" ]; then
              echo "No crates affected — nothing to run."
              exit 0
            fi
            echo "Running tests for: $CRATES"
            PFLAGS=""
            for c in $CRATES; do PFLAGS="$PFLAGS -p $c"; done
            # `--no-tests=pass` keeps PRs that only touch a crate without
            # tests (e.g. librefang-desktop) from failing the selective lane
            # — nextest defaults to exit-4 when -p X resolves to zero tests.
            cargo nextest run $PFLAGS --no-fail-fast --no-tests=pass
          fi
