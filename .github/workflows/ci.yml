name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# On PRs: one run per branch, cancel stale runs.
# On main: each push gets its own group (by SHA) so parallel runs never interfere.
concurrency:
  group: ${{ github.ref == 'refs/heads/main' && format('{0}-{1}', github.workflow, github.sha) || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Detect changes + compute affected crate subset ─────────────────────────────
  # PR lane: only test crates the PR touches (no fan-out to downstream —
  #   main catches cross-crate breakage on merge).
  # Main lane (push to main, or PR that touches CI / root Cargo.toml / xtask):
  #   full workspace test on all three platforms.
  #
  # All detection is pure `git diff` (no external action) so `act` can run
  # this job locally against a stock ubuntu image with no GitHub API access.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.diff.outputs.rust }}
      docs: ${{ steps.diff.outputs.docs }}
      ci: ${{ steps.diff.outputs.ci }}
      install: ${{ steps.diff.outputs.install }}
      full_run: ${{ steps.diff.outputs.full_run }}
      crates: ${{ steps.diff.outputs.crates }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Compute diff and route
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # Range: PR → base..head, push → just the pushed commit.
          if [ "$EVENT_NAME" = "pull_request" ]; then
            RANGE=("$BASE_SHA" "$HEAD_SHA")
          else
            RANGE=("HEAD~1" "HEAD")
          fi

          CHANGED=$(git diff --name-only "${RANGE[@]}")
          echo "Changed files ($EVENT_NAME):"
          printf '  %s\n' $CHANGED

          # Boolean flags — `grep -q` against the diff filenames.
          has() { printf '%s\n' "$CHANGED" | grep -qE "$1"; }

          RUST=false;    has '^(crates/|Cargo\.toml$|Cargo\.lock$|xtask/)'            && RUST=true
          DOCS=false;    has '^(docs/|.*\.md$)'                                       && DOCS=true
          CI=false;      has '^\.github/workflows/'                                   && CI=true
          INSTALL=false; has '^web/public/install\.(sh|ps1)$|^scripts/tests/install_sh_test\.sh$' && INSTALL=true
          ROOT_CARGO=false; has '^Cargo\.toml$|^xtask/'                               && ROOT_CARGO=true

          # Full run policy — stated plainly so it's auditable from the log:
          # 1. Push to main (merge) → catch cross-crate breakage before it rots
          # 2. CI file itself changed → test the new pipeline on every platform
          # 3. Root Cargo.toml / xtask → graph-level change, per-crate logic
          #    can't safely predict the blast radius
          #
          # Platform regressions don't need a special full_run bucket — PR lane
          # test jobs on Windows/macOS cover their affected crates directly.
          if [ "$EVENT_NAME" = "push" ]; then
            FULL=true; REASON="push to main"
          elif [ "$CI" = "true" ]; then
            FULL=true; REASON="CI workflow changed"
          elif [ "$ROOT_CARGO" = "true" ]; then
            FULL=true; REASON="workspace Cargo.toml or xtask changed"
          else
            FULL=false; REASON="selective"
          fi

          {
            echo "rust=$RUST"
            echo "docs=$DOCS"
            echo "ci=$CI"
            echo "install=$INSTALL"
            echo "full_run=$FULL"
          } >> "$GITHUB_OUTPUT"
          echo "Route: full_run=$FULL ($REASON)"

          # Directly-touched crates (no downstream fan-out — on purpose).
          DIRECT=$(printf '%s\n' "$CHANGED" \
            | sed -n 's|^crates/\([^/]*\)/.*|\1|p' \
            | sort -u | tr '\n' ' ')

          # Schema-mirror rule. `librefang-types` is the source of the
          # schemars-derived `KernelConfig` schema, but the golden-file guard
          # (`kernel_config_schema_matches_golden_fixture`) lives in
          # `librefang-api`. A types-only PR would otherwise ship without
          # touching the api crate's tests — the drift then surfaces only on
          # the main full-run, polluting every subsequent PR's selective
          # lane. See incident: #3144 → #3162 → #3167.
          if printf '%s\n' $DIRECT | grep -qx 'librefang-types' \
              && ! printf '%s\n' $DIRECT | grep -qx 'librefang-api'; then
            DIRECT="$DIRECT librefang-api"
            echo "Schema-mirror: librefang-types changed, pulling librefang-api into affected set"
          fi

          echo "crates=$DIRECT" >> "$GITHUB_OUTPUT"
          echo "Affected crates: ${DIRECT:-<none>}"

  # ── Reject dashboard build artifacts in PRs ────────────────────────────────────
  no-build-artifacts:
    name: No Build Artifacts
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Reject static/react/ in PR
        run: |
          # Only flag added or modified files (not deletions — cleanup PRs are OK)
          ADDED=$(git diff --diff-filter=AM --name-only origin/${{ github.base_ref }}...HEAD -- 'crates/librefang-api/static/react/' || true)
          if [ -n "$ADDED" ]; then
            echo "::error::PR adds/modifies dashboard build artifacts (static/react/). These are auto-built by CI — remove them from your commits."
            echo "Fix: git rm --cached crates/librefang-api/static/react/ && git commit --amend"
            exit 1
          fi

  # ── Code quality: fmt (always full, it's a text scan), build + clippy
  # (selective on PR, full on main). The full-run branch delegates to
  # `cargo xtask ci` which keeps web-bundle / dashboard hooks wired; the
  # selective branch skips that because a PR only touching a subset of
  # crates doesn't need to rebuild the dashboard or re-run workspace-wide
  # build steps.
  quality:
    name: Quality
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Check formatting
        run: cargo xtask fmt
      - name: Ensure dashboard build dir exists
        run: mkdir -p crates/librefang-api/static/react
      - name: Build + clippy
        run: |
          if [ "${{ needs.changes.outputs.full_run }}" = "true" ]; then
            echo "Full build + clippy (workspace)…"
            cargo xtask ci --no-test --no-web
          else
            CRATES="${{ needs.changes.outputs.crates }}"
            if [ -z "$CRATES" ]; then
              echo "No crates affected — skipping build + clippy."
              exit 0
            fi
            PFLAGS=""
            for c in $CRATES; do PFLAGS="$PFLAGS -p $c"; done
            echo "Selective build for:  $CRATES"
            # No --lib: binary-only crates (librefang-cli, librefang-desktop)
            # error with "no library targets found" otherwise. Default targets
            # (lib + bins) are what we want anyway.
            cargo build $PFLAGS
            echo "Selective clippy for: $CRATES"
            cargo clippy $PFLAGS --all-targets --all-features -- -D warnings
          fi

  # ── OpenAPI / SDK drift check ──────────────────────────────────────────────────
  # Regenerates openapi.json and the four SDKs and fails if anything differs
  # from what was committed. The pre-commit hook tries to keep these in sync
  # locally with a heuristic, but the heuristic is best-effort — this job is
  # the authoritative gate. Pure Rust changes can move the spec via utoipa
  # schemas in other crates (librefang-types, etc.), so we run on any rust
  # change rather than gating on routes/ alone.
  openapi-drift:
    name: OpenAPI Drift
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: openapi-drift-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
      - name: Install system deps for keyring/secret-service
        # libdbus-sys (pulled in transitively by the keyring crate via
        # secret-service on Linux) needs dbus-1 dev headers + pkg-config.
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libsecret-1-dev pkg-config
      - name: Ensure dashboard build dir exists
        run: mkdir -p crates/librefang-api/static/react
      - name: Regenerate openapi.json
        run: cargo xtask codegen --openapi
      - name: Regenerate SDKs
        run: python3 scripts/codegen-sdks.py
      - name: Verify no drift
        run: |
          if ! git diff --exit-code -- openapi.json sdk/; then
            echo "::error::openapi.json or generated SDKs are out of sync with the source code."
            echo "Reproduce locally:"
            echo "  cargo xtask codegen --openapi"
            echo "  python3 scripts/codegen-sdks.py"
            echo "Then commit the regenerated openapi.json and sdk/* files."
            exit 1
          fi
          echo "openapi.json and SDKs are in sync."

  # ── Security audit (independent) ───────────────────────────────────────────────
  security:
    name: Security
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run security audit
        run: |
          # Ignore known vulnerabilities without fix:
          # - GTK/webkit: transitive from Tauri 2.x
          # - lexical-core: transitive through imap (imap 3.x is alpha, nom 8+ required)
          # - rsa: Marvin Attack timing side-channel, no fix available (transitive from librefang-channels)
          # - rustls-webpki 0.102.x: transitive from rumqttc 0.25.1, no 0.102.x patch exists (RUSTSEC-2026-0104)
          cargo xtask deps --audit \
            --ignore RUSTSEC-2024-0384 \
            --ignore RUSTSEC-2024-0385 \
            --ignore RUSTSEC-2024-0412 \
            --ignore RUSTSEC-2024-0413 \
            --ignore RUSTSEC-2024-0418 \
            --ignore RUSTSEC-2024-0419 \
            --ignore RUSTSEC-2024-0386 \
            --ignore RUSTSEC-2024-0387 \
            --ignore RUSTSEC-2024-0388 \
            --ignore RUSTSEC-2024-0389 \
            --ignore RUSTSEC-2024-0390 \
            --ignore RUSTSEC-2023-0086 \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2026-0049 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104

  # ── Secrets scanning (independent) ─────────────────────────────────────────────
  secrets:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin v3.88.23
      - name: Scan for secrets
        run: |
          trufflehog filesystem . \
            --no-update \
            --fail \
            --only-verified \
            --exclude-paths=<(echo -e "target/\n.git/\nCargo.lock")

  # ── Installer smoke test (fast, independent) ───────────────────────────────────
  install-smoke:
    name: Install Smoke
    needs: changes
    if: needs.changes.outputs.install == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Syntax-check shell installer
        run: |
          sh -n web/public/install.sh
          bash -n web/public/install.sh
      - name: Run shell installer regression tests
        run: sh scripts/tests/install_sh_test.sh
      - name: Parse PowerShell installer
        run: pwsh -NoProfile -Command '$tokens=$null; $errors=$null; [void][System.Management.Automation.Language.Parser]::ParseFile("web/public/install.ps1",[ref]$tokens,[ref]$errors); if ($errors) { $errors | ForEach-Object { Write-Error $_.Message }; exit 1 }'

  # ── Ubuntu tests: selective on PR, full on main ────────────────────────────────
  test-ubuntu:
    name: Test / Ubuntu
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: test-ubuntu-${{ hashFiles('**/Cargo.lock') }}
      - name: Install nextest
        uses: taiki-e/install-action@4616abf838e456930a67014fba647f87c185cc6c # nextest
      - name: Ensure dashboard build dir exists
        run: mkdir -p crates/librefang-api/static/react
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Build tests
        run: |
          if [ "${{ needs.changes.outputs.full_run }}" = "true" ]; then
            echo "Building workspace tests (full run)…"
            cargo test --workspace --no-run -j 2
          else
            CRATES="${{ needs.changes.outputs.crates }}"
            if [ -z "$CRATES" ]; then
              echo "No crates affected — skipping build."
              exit 0
            fi
            echo "Building tests for: $CRATES"
            PFLAGS=""
            for c in $CRATES; do PFLAGS="$PFLAGS -p $c"; done
            cargo test $PFLAGS --no-run -j 2
          fi
      - name: Run tests
        env:
          RUST_TEST_THREADS: "1"
        run: |
          if [ "${{ needs.changes.outputs.full_run }}" = "true" ]; then
            echo "Running workspace tests (full run)…"
            cargo nextest run --workspace --no-fail-fast
          else
            CRATES="${{ needs.changes.outputs.crates }}"
            if [ -z "$CRATES" ]; then
              echo "No crates affected — nothing to run."
              exit 0
            fi
            echo "Running tests for: $CRATES"
            PFLAGS=""
            for c in $CRATES; do PFLAGS="$PFLAGS -p $c"; done
            # `--no-tests=pass` keeps PRs that only touch a crate without
            # tests (e.g. librefang-desktop) from failing the selective lane
            # — nextest defaults to exit-4 when -p X resolves to zero tests.
            cargo nextest run $PFLAGS --no-fail-fast --no-tests=pass
          fi

  # ── Windows tests: selective on PR, full on main ───────────────────────────────
  test-windows:
    name: Test / Windows
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: test-windows-${{ hashFiles('**/Cargo.lock') }}
      - name: Install nextest
        uses: taiki-e/install-action@4616abf838e456930a67014fba647f87c185cc6c # nextest
      - name: Ensure dashboard build dir exists
        run: mkdir -p crates/librefang-api/static/react
        shell: bash
      - name: Run tests
        shell: bash
        run: |
          if [ "${{ needs.changes.outputs.full_run }}" = "true" ]; then
            echo "Running workspace tests (full run)…"
            cargo nextest run --workspace --no-fail-fast
          else
            CRATES="${{ needs.changes.outputs.crates }}"
            if [ -z "$CRATES" ]; then
              echo "No crates affected — nothing to run."
              exit 0
            fi
            echo "Running tests for: $CRATES"
            PFLAGS=""
            for c in $CRATES; do PFLAGS="$PFLAGS -p $c"; done
            # `--no-tests=pass` keeps PRs that only touch a crate without
            # tests (e.g. librefang-desktop) from failing the selective lane
            # — nextest defaults to exit-4 when -p X resolves to zero tests.
            cargo nextest run $PFLAGS --no-fail-fast --no-tests=pass
          fi

  # ── macOS tests: selective on PR, full on main ─────────────────────────────────
  test-macos:
    name: Test / macOS
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: test-macos-${{ hashFiles('**/Cargo.lock') }}
      - name: Install nextest
        uses: taiki-e/install-action@4616abf838e456930a67014fba647f87c185cc6c # nextest
      - name: Ensure dashboard build dir exists
        run: mkdir -p crates/librefang-api/static/react
      - name: Run tests
        run: |
          if [ "${{ needs.changes.outputs.full_run }}" = "true" ]; then
            echo "Running workspace tests (full run)…"
            cargo nextest run --workspace --no-fail-fast
          else
            CRATES="${{ needs.changes.outputs.crates }}"
            if [ -z "$CRATES" ]; then
              echo "No crates affected — nothing to run."
              exit 0
            fi
            echo "Running tests for: $CRATES"
            PFLAGS=""
            for c in $CRATES; do PFLAGS="$PFLAGS -p $c"; done
            # `--no-tests=pass` keeps PRs that only touch a crate without
            # tests (e.g. librefang-desktop) from failing the selective lane
            # — nextest defaults to exit-4 when -p X resolves to zero tests.
            cargo nextest run $PFLAGS --no-fail-fast --no-tests=pass
          fi
