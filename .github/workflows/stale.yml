name: Stale

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. If this is still relevant, please comment
            to keep it open.
          stale-pr-message: >
            This PR has been inactive for 30 days. It will be closed in 14 days
            unless there is new activity. If you need more time, please comment.
          close-issue-message: >
            Closed due to inactivity. Feel free to reopen if this is still relevant.
          close-pr-message: >
            Closed due to inactivity. Feel free to reopen when ready.
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned,good first issue,help wanted'
          exempt-pr-labels: 'pinned,work-in-progress'
