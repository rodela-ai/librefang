name: TODO to Issue

on:
  push:
    branches: [main]

permissions:
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: alstr/todo-to-issue-action@v5
        with:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LABEL: "good first issue,help wanted"
          AUTO_ASSIGN: false
