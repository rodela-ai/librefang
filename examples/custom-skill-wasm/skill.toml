## Custom WASM Skill Example
##
## Counts words, sentences, and characters in text — the WASM twin of
## examples/custom-skill-python, written with the `librefang-skill` SDK.
##
## Build, then test (the `.wasm` is produced by cargo and copied to the root):
##   rustup target add wasm32-unknown-unknown
##   cargo build --release --target wasm32-unknown-unknown
##   cp target/wasm32-unknown-unknown/release/skill.wasm skill.wasm
##   librefang skill test ./examples/custom-skill-wasm --input '{"text": "Hello world. Bye!"}'
##
## For the full reference, see: https://docs.librefang.ai/agent/skills

[skill]
name = "word-counter-wasm"
version = "0.1.0"
description = "Count words, sentences, and characters in text (WASM)."
author = "your-name"
tags = ["text", "utility", "example", "wasm"]

[runtime]
type = "wasm"
entry = "skill.wasm"

[[tools.provided]]
name = "count_words"
description = "Count words, sentences, and characters in text."
input_schema = { type = "object", properties = { text = { type = "string" } }, required = ["text"] }

[requirements]
capabilities = []
