[workspace]
# Independent of the kernel workspace AND of librefang-sidecar's workspace, so its own target/ stays isolated and downstream Cargo's feature unification picks up only what this adapter needs.

[package]
name = "librefang-sidecar-telegram"
version = "0.1.0"
edition = "2021"
description = "Telegram channel adapter for LibreFang — sidecar binary"
license = "MIT"
repository = "https://github.com/librefang/librefang"
homepage = "https://librefang.ai"
keywords = ["librefang", "sidecar", "telegram", "channel", "bot"]
categories = ["api-bindings"]
readme = "README.md"
rust-version = "1.80"

[[bin]]
name = "librefang-sidecar-telegram"
path = "src/main.rs"

[dependencies]
librefang-sidecar = { path = "../librefang-sidecar" }
tokio = { version = "1", features = ["io-std", "io-util", "rt", "rt-multi-thread", "macros", "sync", "time"] }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# rustls-tls so we don't depend on system OpenSSL; json + multipart for Bot API endpoints.
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "multipart", "stream"] }
# regex needed for the markdown parser (inline link / bold / italic patterns) and the HTML sanitiser (tag-allowlist scanner).
regex = "1"
# `once_cell` for the static reaction map and the cached regex set — avoids re-compiling on every send.
once_cell = "1"
