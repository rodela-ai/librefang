[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "librefang-sdk"
version = "0.5.2"
description = "Official Python client and SDK for the LibreFang Agent OS"
readme = "README.md"
license = "MIT"
authors = [
    { name = "LibreFang Team", email = "team@librefang.ai" }
]
keywords = ["librefang", "agent", "ai", "llm", "autonomous-agent", "sdk"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
requires-python = ">=3.8"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
]

[project.urls]
Homepage = "https://librefang.ai"
Repository = "https://github.com/librefang/librefang"
Issues = "https://github.com/librefang/librefang/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["librefang*"]
exclude = ["examples*"]

[tool.setuptools.package-data]
# `sidecar/template/*` ships the adapter scaffold the sidecar docs tell
# users to copy — without this it is absent from the installed wheel.
librefang = ["py.typed", "sidecar/template/*"]

# `python_files = ["*.py"]` made pytest import every example *script*
# as a test module (they target the legacy flat `librefang_sdk`
# layout, not the `librefang.*` package), so `pytest` errored at
# collection on a clean checkout. Restrict to real test files — the
# standard convention — so example scripts stay scripts.
[tool.pytest.ini_options]
testpaths = ["tests", "examples"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
