name = "router"
version = "0.4.1-20260314"
description = "Native deterministic router. Dispatches tasks to hands, specialist templates, or assistant without using shell_exec."
author = "librefang"
module = "builtin:router"
tags = ["router", "dispatcher", "system", "deterministic"]

[metadata.routing]
aliases = ["route this request", "dispatch to the right agent", "pick the best agent", "agent routing", "task router"]
weak_aliases = ["router", "dispatcher", "routing", "triage"]

[model]
provider = "default"
model = "default"
max_tokens = 1
temperature = 0.0
system_prompt = "Native router. The system prompt is unused because builtin:router does not invoke an LLM."
