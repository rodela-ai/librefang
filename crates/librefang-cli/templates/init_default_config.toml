# ══════════════════════════════════════════════════════════════
# LibreFang Agent OS — Configuration
# Docs: https://docs.librefang.ai/configuration
# ══════════════════════════════════════════════════════════════

# ── Server ────────────────────────────────────────────────────
api_listen = "0.0.0.0:4545"    # Use "127.0.0.1:4545" for local-only
log_level = "info"             # trace | debug | info | warn | error
mode = "default"               # stable | default | dev
update_channel = "stable"      # stable | beta | rc

# ── Dashboard Login ───────────────────────────────────────────
# ⚠️  Change the default password after first login!
# Secure storage options:
#   1. Vault:   librefang vault set dashboard_password
#               dashboard_pass = "vault:dashboard_password"
#   2. Env var: LIBREFANG_DASHBOARD_PASS=your-secret
dashboard_user = "librefang"
dashboard_pass = "librefang"

# ── Default LLM ──────────────────────────────────────────────
[default_model]
provider = "{{provider}}"
model = "{{model}}"
api_key_env = "{{api_key_env}}"
# base_url = ""               # Override API endpoint (e.g., local proxy)

# ── Performance ──────────────────────────────────────────────
prompt_caching = true           # Reduce LLM costs (Anthropic/OpenAI)
stable_prefix_mode = true       # Improve prompt cache hit rate
usage_footer = "tokens"         # off | tokens | cost | full

# ── Memory ───────────────────────────────────────────────────
[memory]
decay_rate = 0.05               # Memory confidence decay per cycle
# embedding_model = "all-MiniLM-L6-v2"

# ── Proactive Memory (auto-memorize & auto-retrieve) ─────────
[proactive_memory]
enabled = true
auto_memorize = true            # Auto-extract facts from conversations
auto_retrieve = true            # Auto-recall relevant memories
max_retrieve = 10               # Max memories per retrieval
# extraction_threshold = 0.7   # Min confidence to save memory
# session_ttl_hours = 24
# duplicate_threshold = 0.5
# max_memories_per_agent = 1000

# ── Web Tools ────────────────────────────────────────────────
[web]
search_provider = "auto"        # Tavily → Brave → DuckDuckGo (auto-detect)
# cache_ttl_minutes = 15

[web.fetch]
max_chars = 50000               # Max chars extracted from web pages
timeout_secs = 30
readability = true              # Clean HTML → readable text

# ── Task Queue ───────────────────────────────────────────────
[queue.concurrency]
main_lane = 3                   # Concurrent user messages
cron_lane = 2                   # Concurrent scheduled jobs
subagent_lane = 3               # Concurrent child agents

# ── Shell Execution Policy ───────────────────────────────────
[exec_policy]
mode = "deny"                   # deny | allowlist | full
timeout_secs = 30
max_output_bytes = 102400       # 100 KB

# ── Config Hot-Reload ────────────────────────────────────────
[reload]
mode = "hybrid"                 # off | restart | hot | hybrid
debounce_ms = 500

# ── Provider Regions (uncomment to use) ──────────────────────
# [provider_regions]
# qwen = "intl"                # Qwen international endpoint
# minimax = "china"            # MiniMax China endpoint

# ── Provider URL Overrides (uncomment to use) ────────────────
# [provider_urls]
# ollama = "http://localhost:11434/v1"
# vllm = "http://localhost:8000/v1"

# ── Fallback Providers (LLM failover chain) ──────────────────
# [[fallback_providers]]
# provider = "openai"
# model = "gpt-4o"
# api_key_env = "OPENAI_API_KEY"

# ── Rate Limiting ────────────────────────────────────────────
# [rate_limit]
# api_requests_per_minute = 500   # GCRA token budget per IP
# retry_after_secs = 60           # Retry-After header value (429 responses)
# max_ws_per_ip = 5               # Max concurrent WebSocket connections per IP
# ws_messages_per_minute = 10     # Max WebSocket messages per minute per connection
# ws_idle_timeout_secs = 1800     # Close idle WebSocket after 30 min
# ws_debounce_ms = 100            # Text delta debounce interval
# ws_debounce_chars = 200         # Flush text buffer at this character count
# ── Registry Sync ────────────────────────────────────────────
# [registry]
# cache_ttl_secs = 86400          # Re-download interval (default: 24 hours)
# ── Session Compaction (LLM-based history summarization) ─────
# [compaction]
# threshold_messages = 30       # Compact when message count exceeds this
# keep_recent = 10              # Recent messages preserved verbatim
# max_summary_tokens = 1024     # Max tokens for the LLM summary
# token_threshold_ratio = 0.7   # Trigger at this fraction of context window
# max_chunk_chars = 80000       # Max chars per summarization chunk
# max_retries = 3               # Max LLM summarization retries
# ── Event Triggers ───────────────────────────────────────────
# [triggers]
# cooldown_secs = 5             # Default cooldown between trigger firings
# max_per_event = 10            # Max triggers that can fire per event
# max_depth = 5                 # Max trigger recursion depth
# max_workflow_secs = 3600      # Max workflow execution time (1 hour)

# ── Budget & Cost Control ────────────────────────────────────
# [budget]
# max_hourly_usd = 0.0         # 0 = unlimited
# max_daily_usd = 0.0
# max_monthly_usd = 0.0
# alert_threshold = 0.8        # Alert at 80% of limit

# ── Extended Thinking (Claude models) ────────────────────────
# [thinking]
# budget_tokens = 10000
# stream_thinking = false

# ── Channels (uncomment to enable) ───────────────────────────
# [channels.telegram]
# bot_token_env = "TELEGRAM_BOT_TOKEN"
# default_agent = "assistant"
# allowed_users = []

# [channels.discord]
# bot_token_env = "DISCORD_BOT_TOKEN"
# default_agent = "assistant"

# [channels.slack]
# bot_token_env = "SLACK_BOT_TOKEN"
# app_token_env = "SLACK_APP_TOKEN"
# default_agent = "assistant"

# [channels.wechat]                   # Personal WeChat via iLink protocol
# bot_token_env = "WECHAT_BOT_TOKEN"  # optional: skip QR login on restart
# default_agent = "assistant"
# allowed_users = []                  # format: "hash@im.wechat"

# ── MCP Servers (external tool integration) ──────────────────
# [[mcp_servers]]
# name = "filesystem"
# timeout_secs = 30
# [mcp_servers.transport]
# type = "stdio"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]

# ── Browser Automation ───────────────────────────────────────
# [browser]
# headless = true
# viewport_width = 1280
# viewport_height = 720
# max_sessions = 5

# ── Docker Sandbox ───────────────────────────────────────────
# [docker]
# enabled = false
# image = "python:3.12-slim"
# memory_limit = "512m"
# timeout_secs = 60

# ── File Inbox (Async External Commands) ────────────────────
# Drop text files into a directory to send messages to agents.
# First line may contain `agent:<name>` to target a specific agent.
# [inbox]
# enabled = false
# directory = "~/.librefang/inbox/"   # Defaults to $HOME_DIR/inbox/
# poll_interval_secs = 5
# default_agent = "assistant"         # Agent to use when no agent: directive

# ── Network (P2P Federation) ─────────────────────────────────
# network_enabled = false
# [network]
# shared_secret = ""           # Required for P2P auth
