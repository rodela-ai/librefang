# LibreFang Agent OS configuration
# See https://github.com/librefang/librefang for documentation

api_listen = "127.0.0.1:4545"

[default_model]
provider = "{{provider}}"
model = "{{model}}"
{{api_key_line}}

[memory]
decay_rate = 0.05
{{routing_section}}

# Regional endpoint selection for multi-region providers.
# [provider_regions]
# qwen = "intl"        # Use Qwen international endpoint
# minimax = "china"    # Use MiniMax China endpoint (MINIMAX_CN_API_KEY)
