global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "librefang"
    metrics_path: /api/metrics
    static_configs:
      - targets: ["host.docker.internal:4545"]
        labels:
          instance: "librefang-local"

  - job_name: "ollama"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9102"]
        labels:
          instance: "ollama-local"
